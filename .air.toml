root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["bin", "tmp", "vendor", ".git", ".github", "api", "scripts", "configs"]
  exclude_regex = ["_test\\.go"]
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"

[log]
  time = true

[color]
  build = "yellow"
  runner = "green"
  app = "white"

[misc]
  clean_on_exit = true
